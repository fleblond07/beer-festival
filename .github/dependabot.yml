version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "backend/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "frontend/"
    schedule:
      interval: "weekly"
    groups:
       vite-stack:
          patterns:
             - "vite"
             - "vitest"
             - "@vitest/*"
       eslint-stack:
          patterns:
            - "eslint"
            - "eslint-*"
            - "@typescript-eslint/*"
            - "vue-eslint-parser"
       typescript-stack:
          patterns:
            - "typescript"
            - "@vue/tsconfig"
