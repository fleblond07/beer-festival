version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "backend/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "frontend/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
    groups:
      vue-stack:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "pinia"

      vite-stack:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"

      eslint-stack:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "vue-eslint-parser"

      typescript-stack:
        patterns:
          - "typescript"
          - "@types/*"

      css-tooling:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"
          - "autoprefixer"
          - "prettier"
          - "prettier-*"
